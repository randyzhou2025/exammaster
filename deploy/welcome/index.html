<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>欢迎访问</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(1.5rem, env(safe-area-inset-top)) max(1.25rem, env(safe-area-inset-right))
          max(1.5rem, env(safe-area-inset-bottom)) max(1.25rem, env(safe-area-inset-left));
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
        color: #1e293b;
        background:
          radial-gradient(ellipse 90% 55% at 50% -15%, rgba(99, 102, 241, 0.14), transparent 55%),
          radial-gradient(ellipse 70% 45% at 100% 80%, rgba(14, 165, 233, 0.1), transparent 50%),
          linear-gradient(165deg, #f8fafc 0%, #eef2ff 45%, #f1f5f9 100%);
      }
      main {
        width: 100%;
        max-width: min(92vw, 26rem);
        text-align: center;
      }
      .card {
        padding: 2.25rem 1.75rem 2rem;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.85);
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.04),
          0 20px 50px -20px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3rem;
        height: 3rem;
        margin: 0 auto 1.25rem;
        border-radius: 0.9rem;
        background: linear-gradient(145deg, #6366f1, #4f46e5);
        color: #fff;
        font-size: 1.35rem;
        font-weight: 600;
        line-height: 1;
        box-shadow: 0 10px 25px -8px rgba(79, 70, 229, 0.45);
      }
      h1 {
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        margin: 0 0 0.75rem;
        color: #0f172a;
      }
      p {
        margin: 0;
        font-size: 0.98rem;
        line-height: 1.75;
        color: #64748b;
        /* 减少在词组中间断行；过窄屏再允许自然换行 */
        word-break: keep-all;
        line-break: strict;
        overflow-wrap: break-word;
        text-wrap: pretty;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="mark" aria-hidden="true">站</div>
        <h1>欢迎访问</h1>
        <p>本站正在建设中，内容将陆续上线，敬请<span style="white-space: nowrap">期待</span>。</p>
      </div>
    </main>
  </body>
</html>
