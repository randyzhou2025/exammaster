    <style>
      :root {
        --bg0: #f4f6fb;
        --bg1: #eef2ff;
        --ink: #0f172a;
        --muted: #64748b;
        --brand: #4f46e5;
        --brand2: #0ea5e9;
        --card: rgba(255, 255, 255, 0.78);
        --card-border: rgba(255, 255, 255, 0.9);
        --shadow: 0 1px 2px rgba(15, 23, 42, 0.05), 0 22px 48px -24px rgba(15, 23, 42, 0.14);
        --radius: 1.25rem;
        --tap: 44px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow-x: clip;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(ellipse 100% 60% at 50% -20%, rgba(99, 102, 241, 0.16), transparent 55%),
          radial-gradient(ellipse 65% 50% at 100% 100%, rgba(14, 165, 233, 0.12), transparent 50%),
          linear-gradient(168deg, var(--bg0) 0%, var(--bg1) 42%, #f8fafc 100%);
        /* 手机端优先：左右至少 1rem，并与安全区取较大值 */
        padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right))
          max(1.5rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
      }

      @media (min-width: 480px) {
        body {
          padding-left: max(1.25rem, env(safe-area-inset-left));
          padding-right: max(1.25rem, env(safe-area-inset-right));
        }
      }

      .wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 40rem;
        margin: 0 auto;
        min-width: 0;
        min-height: 0;
      }

      .content {
        flex: 0 0 auto;
      }

      /* 声明 + 页脚：内容少时贴底，内容多时在正文下方自然排列 */
      .site-footer {
        margin-top: auto;
        padding-top: 2rem;
      }

      header.hero {
        text-align: center;
        padding: 0.5rem 0 1.5rem;
        width: 100%;
        min-width: 0;
      }

      .avatar {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 4rem;
        height: 4rem;
        margin-bottom: 1rem;
        border-radius: 1.1rem;
        background: linear-gradient(145deg, var(--brand), #6366f1);
        color: #fff;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        box-shadow: 0 14px 36px -12px rgba(79, 70, 229, 0.55);
      }

      .hero h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.25rem, 5vw, 1.85rem);
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--ink);
        overflow-wrap: anywhere;
        word-break: break-word;
        padding-inline: 0.125rem;
      }

      /* 中文在窄屏必须可换行：勿用 keep-all/strict，易在 iOS/WebKit 上整行溢出裁切 */
      .hero .tagline,
      .entry-desc,
      .note,
      .disclaimer {
        overflow-wrap: anywhere;
        word-break: break-word;
        hyphens: auto;
        text-wrap: pretty;
      }

      .hero .tagline {
        display: block;
        width: 100%;
        max-width: min(100%, 28rem);
        margin: 0 auto;
        box-sizing: border-box;
        font-size: clamp(0.9rem, 3.8vw, 0.98rem);
        line-height: 1.75;
        color: var(--muted);
        text-align: center;
        padding-inline: 0.125rem;
      }

      section.block {
        margin-top: 0.5rem;
      }

      .block h2 {
        margin: 0 0 0.75rem;
        padding-left: 0.15rem;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #94a3b8;
      }

      /* 项目卡片：图标 | 文案区(flex) | 右侧箭头，避免右侧大块留白 */
      a.entry {
        display: block;
        text-decoration: none;
        color: inherit;
        border-radius: var(--radius);
        background: var(--card);
        border: 1px solid var(--card-border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        padding: 1rem 0.85rem 1rem 1rem;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        position: relative;
        overflow: hidden;
      }

      a.entry::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, var(--brand), var(--brand2));
        border-radius: 3px 0 0 3px;
      }

      @media (min-width: 480px) {
        a.entry {
          padding: 1.15rem 1.1rem 1.15rem 1.2rem;
        }
      }

      @media (hover: hover) and (pointer: fine) {
        a.entry:hover {
          transform: translateY(-2px);
          box-shadow:
            0 1px 2px rgba(15, 23, 42, 0.06),
            0 28px 56px -28px rgba(15, 23, 42, 0.18);
          border-color: rgba(99, 102, 241, 0.35);
        }

        a.entry:hover .entry-go {
          background: rgba(79, 70, 229, 0.14);
        }

        a.entry:hover .entry-go svg {
          transform: translateX(2px);
        }
      }

      a.entry:focus-visible {
        outline: 2px solid var(--brand);
        outline-offset: 3px;
      }

      .entry-inner {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        min-width: 0;
      }

      .entry-icon {
        flex-shrink: 0;
        width: 2.75rem;
        height: 2.75rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.85rem;
        background: linear-gradient(135deg, rgba(79, 70, 229, 0.12), rgba(14, 165, 233, 0.14));
        border: 1px solid rgba(99, 102, 241, 0.18);
      }

      .entry-icon svg {
        width: 1.4rem;
        height: 1.4rem;
        color: var(--brand);
      }

      .entry-main {
        flex: 1;
        min-width: 0;
      }

      .entry-title-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.4rem 0.5rem;
        margin-bottom: 0.3rem;
      }

      .entry-title {
        margin: 0;
        font-size: clamp(0.98rem, 4vw, 1.1rem);
        font-weight: 700;
        color: var(--ink);
        line-height: 1.35;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .entry-badge {
        display: inline-block;
        padding: 0.12rem 0.45rem;
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--brand);
        background: rgba(79, 70, 229, 0.1);
        border-radius: 999px;
        line-height: 1.4;
      }

      .entry-desc {
        margin: 0;
        font-size: clamp(0.8rem, 3.4vw, 0.88rem);
        line-height: 1.55;
        color: var(--muted);
      }

      .entry-go {
        flex-shrink: 0;
        width: 2.25rem;
        height: 2.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: rgba(79, 70, 229, 0.08);
        color: var(--brand);
      }

      .entry-go svg {
        width: 1.15rem;
        height: 1.15rem;
        transition: transform 0.18s ease;
      }

      .note {
        margin-top: 1.5rem;
        padding: 1rem 0.9rem;
        border-radius: 0.9rem;
        background: rgba(255, 255, 255, 0.45);
        border: 1px solid rgba(148, 163, 184, 0.25);
        font-size: 0.88rem;
        line-height: 1.65;
        color: #64748b;
        text-align: center;
      }

      .disclaimer {
        margin: 0;
        padding-top: 1.25rem;
        border-top: 1px solid rgba(148, 163, 184, 0.28);
        text-align: center;
        font-size: clamp(0.72rem, 3.2vw, 0.78rem);
        line-height: 1.65;
        color: #94a3b8;
        padding-inline: 0.125rem;
      }

      .site-footer footer {
        margin: 1rem 0 0;
        text-align: center;
        font-size: 0.8rem;
        color: #94a3b8;
      }
    </style>
